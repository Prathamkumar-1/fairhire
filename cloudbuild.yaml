substitutions:
  _REGION: us-central1
  _SERVICE_NAME: fairhire-backend
  _AR_HOST: us-central1-docker.pkg.dev

steps:
  # ── Step 1: Build Docker image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - build
      - "-t"
      - "${_AR_HOST}/$PROJECT_ID/fairhire/$_SERVICE_NAME:$COMMIT_SHA"
      - "-t"
      - "${_AR_HOST}/$PROJECT_ID/fairhire/$_SERVICE_NAME:latest"
      - "./backend"

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - push
      - "--all-tags"
      - "${_AR_HOST}/$PROJECT_ID/fairhire/$_SERVICE_NAME"
    waitFor:
      - build-image

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_AR_HOST}/$PROJECT_ID/fairhire/$_SERVICE_NAME:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--timeout=300"
      - "--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest,GOOGLE_CLOUD_PROJECT=GOOGLE_CLOUD_PROJECT:latest"
    waitFor:
      - push-image

images:
  - "${_AR_HOST}/$PROJECT_ID/fairhire/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_AR_HOST}/$PROJECT_ID/fairhire/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
