<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FairHire – AI-powered bias detection for fairer hiring">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Social / SEO -->
  <meta property="og:title" content="FairHire">
  <meta property="og:description" content="AI-powered bias detection for fairer hiring">
  <meta property="og:type" content="website">

  <title>FairHire</title>

  <!-- Firebase SDK (compat for FlutterFire web) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #F8F9FA;
      font-family: 'Roboto', sans-serif;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F8F9FA;
      z-index: 9999;
    }
    .loading-icon {
      width: 72px;
      height: 72px;
      background: rgba(24,95,165,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .loading-icon svg { width: 40px; height: 40px; }
    .loading-title {
      font-size: 28px;
      font-weight: 800;
      color: #185FA5;
      margin: 0 0 6px;
    }
    .loading-sub {
      font-size: 14px;
      color: #6C757D;
      margin: 0 0 28px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E9ECEF;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen shown before Flutter initialises -->
  <div id="loading-screen">
    <div class="loading-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <p class="loading-title">FairHire</p>
    <p class="loading-sub">AI-powered bias detection for fairer hiring</p>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading-screen');
      if (el) el.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
